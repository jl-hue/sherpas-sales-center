};

function computeV5(niveau,psycho,objectif_vie,accomp){
  const s=Object.fromEntries(PROF_TYPES.map(k=>[k,0]));
  const add=(r)=>{if(r)Object.entries(r).forEach(([k,v])=>{s[k]=(s[k]||0)+v;});};
  add(RULES.niveau[niveau]);add(RULES.psycho[psycho]);add(RULES.objectif_vie[objectif_vie]);
  const douceurW=Math.max(0,(5-accomp)/5);const fermetW=Math.max(0,(accomp-5)/5);
  Object.entries(RULES.accomp_douceur).forEach(([k,v])=>{s[k]=(s[k]||0)+(v*douceurW);});
  Object.entries(RULES.accomp_fermete).forEach(([k,v])=>{s[k]=(s[k]||0)+(v*fermetW);});
  return Object.entries(s).sort((a,b)=>b[1]-a[1]).map(([typ,score])=>({typ,score}));
}

function CopyBtn({text}){
  const [copied,setCopied]=useState(false);
  function copy(){navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(()=>{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000);});}
  return <button onClick={copy} className="copy-btn" style={{padding:"7px 16px",borderRadius:99,border:"none",background:copied?"#16A34A":"#18181B",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>{copied?"✓ Copié !":"📋 Copier le script"}</button>;
}

function MatriceNeuro(){
  const [filtreProf,setFiltreProf]=useState("Tous");
  const [filtreTrouble,setFiltreTrouble]=useState("Tous");
  const [expanded,setExpanded]=useState(null);

  const filtered=NEURO_MATRIX.filter(r=>{
    if(filtreProf!=="Tous"&&r.prof!==filtreProf) return false;
    if(filtreTrouble!=="Tous"&&r.trouble!==filtreTrouble) return false;
    return true;
  });

  const BADGE={
    ideal:  {label:"✅ Idéal",     bg:"#D1FAE5",color:"#15803D",border:"#86EFAC"},
    acceptable:{label:"⚠️ Acceptable",bg:"#FEF9C3",color:"#854D0E",border:"#FDE047"},
    deconseille:{label:"❌ Déconseillé",bg:"#FEE2E2",color:"#991B1B",border:"#FCA5A5"},
  };

  return <div>
    {/* En-tête */}
    <div style={{marginBottom:18}}>
      <div style={{fontSize:15,fontWeight:800,color:"#18181B",fontFamily:"'Outfit',sans-serif",marginBottom:3}}>🧠 Matrice Neuroatypiques</div>
      <div style={{fontSize:12,color:"#71717A"}}>Matching prof × trouble — Réalité + argument commercial</div>
    </div>

    {/* Légende */}
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      {Object.values(BADGE).map(b=><span key={b.label} style={{fontSize:11,padding:"3px 10px",borderRadius:99,background:b.bg,color:b.color,border:`1px solid ${b.border}`,fontWeight:700}}>{b.label}</span>)}
    </div>

    {/* Filtres */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:"#71717A",marginBottom:6,fontFamily:"'Outfit',sans-serif"}}>Filtrer par professeur</div>
        <select value={filtreProf} onChange={e=>{setFiltreProf(e.target.value);setExpanded(null);}} style={{width:"100%",fontSize:13,border:"1px solid #E4E4E7",borderRadius:9,padding:"8px 12px",fontFamily:"'Inter',sans-serif",color:"#18181B",background:"#fff"}}>
          <option>Tous</option>
          {NEURO_PROFS.map(p=><option key={p}>{p}</option>)}
        </select>
      </div>
      <div>
        <div style={{fontSize:11,fontWeight:700,color:"#71717A",marginBottom:6,fontFamily:"'Outfit',sans-serif"}}>Filtrer par trouble</div>
        <select value={filtreTrouble} onChange={e=>{setFiltreTrouble(e.target.value);setExpanded(null);}} style={{width:"100%",fontSize:13,border:"1px solid #E4E4E7",borderRadius:9,padding:"8px 12px",fontFamily:"'Inter',sans-serif",color:"#18181B",background:"#fff"}}>
          <option>Tous</option>
          {NEURO_TROUBLES.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
    </div>

    {/* Compteur */}
    <div style={{fontSize:11,color:"#A1A1AA",marginBottom:10}}>{filtered.length} combinaison{filtered.length>1?"s":""} affichée{filtered.length>1?"s":""}</div>

    {/* Cartes */}
    <div style={{display:"flex",flexDirection:"column",gap:9}}>
      {filtered.map((r,i)=>{
        const b=BADGE[r.badge];
        const key=r.prof+r.trouble;
        const open=expanded===key;
        const tc=NEURO_COLORS[r.trouble]||"#6B7280";
        return <div key={key} style={{borderRadius:14,border:`1px solid ${b.border}`,background:b.bg,overflow:"hidden"}}>
          <button onClick={()=>setExpanded(open?null:key)} style={{width:"100%",padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
                <span style={{fontSize:18,flexShrink:0}}>{NEURO_EMOJIS[r.trouble]||"🔷"}</span>
                <div style={{minWidth:0}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:11,fontWeight:800,color:tc,background:tc+"15",borderRadius:99,padding:"2px 8px",whiteSpace:"nowrap"}}>{r.trouble}</span>
                    <span style={{fontSize:10,color:"#71717A",fontWeight:600}}>×</span>
                    <span style={{fontSize:11,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{r.prof}</span>
                  </div>
                  <div style={{marginTop:4}}><span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:b.bg,color:b.color,border:`1px solid ${b.border}`,fontWeight:700}}>{b.label}</span></div>
                </div>
              </div>
              <span style={{fontSize:14,color:b.color,flexShrink:0}}>{open?"▲":"▼"}</span>
            </div>
          </button>

          {open&&<div style={{padding:"0 16px 16px"}}>
            <div style={{height:1,background:b.border,marginBottom:12}}/>
            {/* Réalité */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:800,color:b.color,textTransform:"uppercase",letterSpacing:".08em",marginBottom:5,fontFamily:"'Outfit',sans-serif"}}>📋 La réalité</div>
              <div style={{fontSize:13,color:"#3F3F46",lineHeight:1.7,background:"rgba(255,255,255,.6)",borderRadius:9,padding:"10px 13px",borderLeft:`3px solid ${b.color}`}}>{r.realite}</div>
            </div>
            {/* En appel */}
            <div>
              <div style={{fontSize:10,fontWeight:800,color:b.color,textTransform:"uppercase",letterSpacing:".08em",marginBottom:5,fontFamily:"'Outfit',sans-serif"}}>📞 En appel</div>
              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <div style={{flex:1,fontSize:13,color:"#3F3F46",lineHeight:1.7,fontStyle:"italic",background:"rgba(255,255,255,.6)",borderRadius:9,padding:"10px 13px",borderLeft:`3px solid ${b.color}`}}>{r.appel}</div>
                <CopyBtn text={r.appel}/>
              </div>
            </div>
          </div>}
        </div>;
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:28,color:"#A1A1AA",fontSize:13}}>Aucune combinaison pour ces filtres.</div>}
    </div>
  </div>;
}

function SalesLanterne({stock,setMatchings,user}){
  const [activeTab,setActiveTab]=useState("prescription");
  // ── État Prescription ──────────────────────────────────────────
  // Inputs
  const [step,setStep]=useState(1);
  const [prenom,setPrenom]=useState("");
  const [niveau,setNiveau]=useState("");
  const [matieres,setMatieres]=useState([]);
  const [psycho,setPsycho]=useState("");
  const [accomp,setAccomp]=useState(5);
  const [objectifVie,setObjectifVie]=useState("");
  const [souhaitParent,setSouhaitParent]=useState("");
  // Results
  const [portrait,setPortrait]=useState(null);
  const [chosenB,setChosenB]=useState("");
  const [activeOption,setActiveOption]=useState("A");
  const [scriptGenerated,setScriptGenerated]=useState(false);

  const stockMap=Object.fromEntries(stock.map(s=>[s.typ,s]));
  const canAnalyze=niveau&&psycho&&objectifVie;

  function analyze(){
    const p=computeV5(niveau,psycho,objectifVie,accomp);
    setPortrait(p);
    setChosenB(stock.find(s=>s.dispo)?.typ||PROF_TYPES[0]);
    setStep(2);
    setScriptGenerated(false);
  }
  function reset(){setStep(1);setPortrait(null);setChosenB("");setActiveOption("A");setScriptGenerated(false);setPrenom("");setNiveau("");setMatieres([]);setPsycho("");setAccomp(5);setObjectifVie("");setSouhaitParent("");}

  async function generateScript(){
    setScriptGenerated(true);
    const idealTyp=portrait[0].typ;
    const chosenTyp=activeOption==="A"?idealTyp:chosenB;
    const followed=activeOption==="A";
    await setMatchings({id:Date.now(),date:today(),auteur:user?.name||"Moi",idealTyp,chosenTyp,followed,niveau,psycho});
  }

  const accompLabel=accomp<=3?"Douceur & Empathie":accomp>=7?"Fermeté & Cadre":"Équilibre";
  const accompColor=accomp<=3?"#16A34A":accomp>=7?"#DA4F00":"#0B68B4";

  // ─── STEP 1: Formulaire ───────────────────────────────────────
  if(step===1||step===2) return <div>
    {/* Onglets */}
    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {[["prescription","🔦 Prescription","Diagnostic + Dual Path"],["neuro","🧠 Neuroatypiques","Matrice prof × trouble"]].map(([id,label,sub])=>(
        <button key={id} onClick={()=>setActiveTab(id)} style={{flex:1,padding:"10px 14px",borderRadius:12,border:`2px solid ${activeTab===id?"#16A34A":"#E4E4E7"}`,background:activeTab===id?"#E1FFED":"#fff",cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
          <div style={{fontSize:13,fontWeight:800,color:activeTab===id?"#16A34A":"#18181B",fontFamily:"'Outfit',sans-serif"}}>{label}</div>
          <div style={{fontSize:11,color:"#71717A",marginTop:2}}>{sub}</div>
        </button>
      ))}
    </div>

    {/* Tab Neuroatypiques */}
    {activeTab==="neuro"&&<MatriceNeuro/>}

    {/* Tab Prescription */}
    {activeTab==="prescription"&&step===1&&<div>
    <ST emoji="🔦" sub="Le cerveau stratégique de l'application — prescription & argumentation dynamique.">Lanterne Match V5</ST>

${injectPrenom(args.trust)}

    {/* ── BOUTON GÉNÉRER ── */}

          <div style={{fontSize:12,color:"#71717A",marginTop:2}}>{chosenLabel} · {nom} · {psycho}</div>

              <div style={{fontSize:11,color:"#71717A"}}>{desc}</div>

          <div style={{fontSize:14,color:"#3F3F46",lineHeight:1.75,marginTop:8,fontStyle:"italic",fontFamily:"'Inter',sans-serif",background:"rgba(255,255,255,.7)",borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${color}`}}>
            "{injectPrenom(text)}"
          </div>
        </C>
      ))}

      <div style={{marginTop:4}}>
        <Btn onClick={()=>{setScriptGenerated(false);}} outline color="#71717A" sm>Changer d'option</Btn>
      </div>
    </div>}

    {scriptGenerated&&!args&&<C style={{background:"#FFF7F0",border:"1px solid #FED7AA",textAlign:"center",padding:24}}>
      <div style={{fontSize:20,marginBottom:8}}>🔧</div>

      <div style={{fontSize:12,color:"#71717A",marginTop:4}}>Ce profil sera disponible dans la prochaine mise à jour.</div>
    </C>}
    </div>}{/* fin prescription step 2 */}
  </div>;/* fin wrapper onglets step 2 */
}

// ─── MATCHING IDÉAL VS MANUEL — NOUVEAU V5 ────────────────────────
function ManagerMatching({matchings}){
  const total=matchings.length;const followed=matchings.filter(m=>m.followed).length;const pivoted=total-followed;const pct=total?Math.round((followed/total)*100):0;
  // Profils les plus souvent pivotés
  const pivots={};matchings.filter(m=>!m.followed).forEach(m=>{const k=`${m.idealTyp} → ${m.chosenTyp}`;pivots[k]=(pivots[k]||0)+1;});
  const pivotRanking=Object.entries(pivots).sort((a,b)=>b[1]-a[1]);
  // Profils idéaux les plus recommandés
  const idealCounts={};matchings.forEach(m=>{idealCounts[m.idealTyp]=(idealCounts[m.idealTyp]||0)+1;});
  const idealRank=Object.entries(idealCounts).sort((a,b)=>b[1]-a[1]);
  // Psychos qui pivotent le plus
  const psychoPivots={};matchings.filter(m=>!m.followed).forEach(m=>{psychoPivots[m.psycho]=(psychoPivots[m.psycho]||0)+1;});

  return <div>
    <ST emoji="⚖️" sub="Analyse de l'écart entre le profil idéal recommandé et le profil réellement vendu.">Idéal vs Manuel</ST>

    {/* Score global */}
    <GC style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <Pill color="#fff" bg="rgba(255,255,255,.2)">Taux de suivi Idéal Sherpas</Pill>
          <div style={{fontSize:36,fontWeight:900,color:"#fff",marginTop:5,fontFamily:"'Outfit',sans-serif"}}>{pct}%</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginTop:1}}>{followed} suivis · {pivoted} pivots manuels · {total} matchings total</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{width:72,height:72,borderRadius:"50%",background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
            <div style={{fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Outfit',sans-serif"}}>{pct}%</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.7)"}}>Idéal</div>
          </div>
        </div>
      </div>
      <div style={{marginTop:12,height:8,background:"rgba(255,255,255,.2)",borderRadius:99}}><div style={{height:8,background:"#fff",borderRadius:99,width:`${pct}%`}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}><span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>0% — Toujours en pivot</span><span style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>100% — Toujours l'Idéal</span></div>
    </GC>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      {/* Profils idéaux les + recommandés */}
      <C>
        <div style={{fontWeight:700,fontSize:13,color:"#18181B",marginBottom:12,fontFamily:"'Outfit',sans-serif"}}>✦ Profils Idéal les + recommandés</div>
        {idealRank.map(([typ,n],i)=><div key={typ} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
          <span style={{fontSize:14}}>{["🥇","🥈","🥉","🏅","🎖️"][i]||"•"}</span>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:12,fontWeight:600,color:"#3F3F46"}}>{typ}</span><span style={{fontSize:11,color:"#A1A1AA"}}>{n}x</span></div>
            <div style={{height:3,background:"#F4F4F5",borderRadius:99}}><div style={{height:3,background:"#16A34A",borderRadius:99,width:`${total>0?(n/total)*100:0}%`}}/></div>
          </div>
        </div>)}
      </C>

      {/* Pivots les plus fréquents */}
      <C>
        <div style={{fontWeight:700,fontSize:13,color:"#18181B",marginBottom:12,fontFamily:"'Outfit',sans-serif"}}>🔄 Pivots les plus fréquents</div>
        {pivotRanking.length===0?<div style={{fontSize:12,color:"#A1A1AA"}}>Aucun pivot enregistré — l'équipe suit l'Idéal 🎉</div>:pivotRanking.map(([label,n],i)=><div key={label} style={{marginBottom:10,padding:"9px 11px",background:"#FFF7F0",borderRadius:9,borderLeft:"3px solid #DA4F00"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,fontWeight:700,color:"#C2410C",fontFamily:"'Outfit',sans-serif"}}>{label}</span><Pill color="#DA4F00">{n}x</Pill></div>
        </div>)}
      </C>
    </div>

    {/* Psychos qui pivotent */}
    <C style={{marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:13,color:"#18181B",marginBottom:12,fontFamily:"'Outfit',sans-serif"}}>🧠 Profils psycho les plus difficiles à matcher</div>
      {Object.entries(psychoPivots).length===0?<div style={{fontSize:12,color:"#A1A1AA"}}>Aucune donnée de pivot disponible.</div>:Object.entries(psychoPivots).sort((a,b)=>b[1]-a[1]).map(([ps,n])=><div key={ps} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9,paddingBottom:9,borderBottom:"1px solid #F4F4F5"}}>
        <div style={{fontSize:13,color:"#3F3F46",fontWeight:600}}>{ps}</div>
        <Pill color="#E11D48">{n} pivot{n>1?"s":""}</Pill>
      </div>)}
    </C>

    {/* Historique */}
    <C>
      <div style={{fontWeight:700,fontSize:13,color:"#18181B",marginBottom:12,fontFamily:"'Outfit',sans-serif"}}>📋 Historique des matchings</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {matchings.slice(0,8).map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,background:m.followed?"#F0FDF4":"#FFF7F0",border:`1px solid ${m.followed?"#C0EAD3":"#FED7AA"}`}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:m.followed?"#16A34A":"#DA4F00",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,flexShrink:0}}>{m.followed?"✓":"⚡"}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{m.auteur} · {m.psycho}</div>
            <div style={{fontSize:11,color:"#71717A",marginTop:1}}>{m.followed?`Idéal suivi : ${m.idealTyp}`:`Pivot : ${m.idealTyp} → ${m.chosenTyp}`}</div>
          </div>
          <span style={{fontSize:10,color:"#A1A1AA"}}>{m.date}</span>
        </div>)}
      </div>
    </C>
  </div>;
}

function FormateurSuggestions({suggestions,setSuggestions,updateStatut,deleteSugg}){
  const pending=suggestions.filter(s=>s.statut==="pending");const approved=suggestions.filter(s=>s.statut==="approved");
  async function approve(id){if(updateStatut)await updateStatut(id,"approved");else setSuggestions(p=>p.map(s=>s.id===id?{...s,statut:"approved"}:s));}
  async function reject(id){if(deleteSugg)await deleteSugg(id);else setSuggestions(p=>p.filter(s=>s.id!==id));}
  return <div>
    <ST emoji="💡" sub="Valide les suggestions remontées par les Sales.">Suggestions équipe</ST>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}><Stat icon="⏳" label="En attente" value={pending.length} color="#DA4F00"/><Stat icon="✅" label="Approuvées" value={approved.length} color="#16A34A"/></div>
    {pending.map(s=><C key={s.id} style={{marginBottom:9,borderLeft:"4px solid #DA4F00"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><Pill color="#DA4F00">{s.type}</Pill><span style={{fontSize:10,color:"#A1A1AA"}}>{s.auteur} · {s.date}</span></div><div style={{fontSize:12,color:"#3F3F46",background:"#FFF7F0",borderRadius:9,padding:"10px 12px",marginBottom:9,lineHeight:1.6,fontStyle:"italic"}}>"{s.contenu}"</div><div style={{display:"flex",gap:7}}><Btn onClick={()=>approve(s.id)} sm color="#16A34A">✓ Approuver</Btn><Btn onClick={()=>reject(s.id)} outline sm color="#E11D48">✗ Rejeter</Btn></div></C>)}
    {approved.map(s=><C key={s.id} style={{marginBottom:7,padding:"11px 14px",borderLeft:"4px solid #16A34A",background:"#F0FDF4"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:11,fontWeight:700,color:"#15803D",fontFamily:"'Outfit',sans-serif"}}>{s.auteur} · {s.date}</div><div style={{fontSize:12,color:"#3F3F46",marginTop:3,fontStyle:"italic"}}>"{s.contenu}"</div></div><Pill color="#16A34A">Intégré ✓</Pill></div></C>)}

}

function FormateurFormations({formations,setFormations}){
  const F=formations&&Object.keys(formations).length>0?formations:FORMATION_DEFAULT;
  const [pilier,setPilier]=useState(Object.keys(F)[0]||"sales");
  const [editMod,setEditMod]=useState(null); // {pilierKey, idx} or null
  const [editPilier,setEditPilier]=useState(null); // pilierKey or null
  const [showNewMod,setShowNewMod]=useState(false);
  const [showNewPilier,setShowNewPilier]=useState(false);

  // Module edit state
  const [mTitle,setMTitle]=useState("");const [mDur,setMDur]=useState("");const [mDesc,setMDesc]=useState("");
  // Pilier edit state
  const [pTitle,setPTitle]=useState("");const [pIcon,setPIcon]=useState("");const [pColor,setPColor]=useState("#16A34A");
  // New pilier state
  const [npTitle,setNpTitle]=useState("");const [npIcon,setNpIcon]=useState("📚");const [npColor,setNpColor]=useState("#7C3AED");

  const COLORS=["#16A34A","#0B68B4","#DA4F00","#7C3AED","#E11D48","#0891B2"];

  function save(next){setFormations({...next});}

  function startEditMod(pk,idx){
    const m=F[pk].modules[idx];
    setMTitle(m.title);setMDur(m.duration);setMDesc(m.description||"");
    setEditMod({pk,idx});setShowNewMod(false);
  }
  function saveMod(){
    if(!mTitle.trim()) return;
    const next={...F};
    next[editMod.pk]={...next[editMod.pk],modules:[...next[editMod.pk].modules]};
    next[editMod.pk].modules[editMod.idx]={...next[editMod.pk].modules[editMod.idx],title:mTitle,duration:mDur,description:mDesc};
    save(next);setEditMod(null);
  }
  function deleteMod(pk,idx){
    const next={...F};
    next[pk]={...next[pk],modules:next[pk].modules.filter((_,i)=>i!==idx)};
    save(next);
  }
  function addMod(){
    if(!mTitle.trim()) return;
    const next={...F};
    const newMod={id:Date.now(),title:mTitle,duration:mDur||"30 min",done:false,description:mDesc};
    next[pilier]={...next[pilier],modules:[...next[pilier].modules,newMod]};
    save(next);setShowNewMod(false);setMTitle("");setMDur("");setMDesc("");
  }

  function startEditPilier(pk){
    setPTitle(F[pk].title);setPIcon(F[pk].icon);setPColor(F[pk].color);
    setEditPilier(pk);
  }
  function savePilier(){
    if(!pTitle.trim()) return;
    const next={...F};
    next[editPilier]={...next[editPilier],title:pTitle,icon:pIcon,color:pColor};
    save(next);setEditPilier(null);
  }
  function deletePilier(pk){
    if(Object.keys(F).length<=1){alert("Il faut au moins un pilier.");return;}
    const next={...F};delete next[pk];
    const firstKey=Object.keys(next)[0];
    save(next);setPilier(firstKey);
  }
  function addPilier(){
    if(!npTitle.trim()) return;
    const key="pilier_"+Date.now();
    const next={...F,[key]:{title:npTitle,icon:npIcon,color:npColor,modules:[]}};
    save(next);setPilier(key);setShowNewPilier(false);setNpTitle("");setNpIcon("📚");setNpColor("#7C3AED");
  }

  const pill=F[pilier]||Object.values(F)[0];

  return <div>
    <ST emoji="🎓" sub="Gérez les piliers de formation et leurs modules. Les Sales voient les changements immédiatement.">Éditeur Formations</ST>

    {/* Piliers */}
    <C style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>📚 Piliers de formation</div>
        <Btn sm color="#DA4F00" onClick={()=>setShowNewPilier(!showNewPilier)}>+ Nouveau pilier</Btn>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {Object.entries(F).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>setPilier(k)} style={{padding:"7px 14px",borderRadius:99,border:`2px solid ${pilier===k?v.color:"#E4E4E7"}`,background:pilier===k?v.color:"#fff",color:pilier===k?"#fff":"#71717A",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{v.icon} {v.title}</button>
            <button onClick={()=>startEditPilier(k)} style={{padding:"5px 8px",borderRadius:8,border:"1px solid #E4E4E7",background:"#fff",cursor:"pointer",fontSize:12,color:"#71717A"}}>✏️</button>
          </div>
        ))}
      </div>

      {/* Nouveau pilier */}
      {showNewPilier&&<div style={{marginTop:14,padding:14,background:"#F8FFF9",borderRadius:10,border:"1px solid #C0EAD3"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#15803D",marginBottom:10,fontFamily:"'Outfit',sans-serif"}}>Nouveau pilier</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 80px",gap:8,marginBottom:8}}>
          <input value={npTitle} onChange={e=>setNpTitle(e.target.value)} placeholder="Nom du pilier" style={{fontSize:13,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px 11px",fontFamily:"'Inter',sans-serif"}}/>
          <input value={npIcon} onChange={e=>setNpIcon(e.target.value)} placeholder="🎯" style={{fontSize:18,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px",textAlign:"center"}}/>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {COLORS.map(c=><button key={c} onClick={()=>setNpColor(c)} style={{width:24,height:24,borderRadius:"50%",background:c,border:npColor===c?"3px solid #18181B":"2px solid transparent",cursor:"pointer"}}/>)}
        </div>
        <div style={{display:"flex",gap:7}}>
          <Btn sm color="#16A34A" onClick={addPilier}>Créer</Btn>
          <Btn sm outline color="#71717A" onClick={()=>setShowNewPilier(false)}>Annuler</Btn>
        </div>
      </div>}

      {/* Éditer pilier */}
      {editPilier&&<div style={{marginTop:14,padding:14,background:"#FFF7F0",borderRadius:10,border:"1px solid #FED7AA"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#C2410C",marginBottom:10,fontFamily:"'Outfit',sans-serif"}}>Modifier le pilier</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 60px",gap:8,marginBottom:8}}>
          <input value={pTitle} onChange={e=>setPTitle(e.target.value)} style={{fontSize:13,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px 11px",fontFamily:"'Inter',sans-serif"}}/>
          <input value={pIcon} onChange={e=>setPIcon(e.target.value)} style={{fontSize:18,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px",textAlign:"center"}}/>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {COLORS.map(c=><button key={c} onClick={()=>setPColor(c)} style={{width:24,height:24,borderRadius:"50%",background:c,border:pColor===c?"3px solid #18181B":"2px solid transparent",cursor:"pointer"}}/>)}
        </div>
        <div style={{display:"flex",gap:7}}>
          <Btn sm color="#DA4F00" onClick={savePilier}>Sauvegarder</Btn>
          <Btn sm outline color="#E11D48" onClick={()=>deletePilier(editPilier)}>🗑️ Supprimer</Btn>
          <Btn sm outline color="#71717A" onClick={()=>setEditPilier(null)}>Annuler</Btn>
        </div>
      </div>}
    </C>

    {/* Modules du pilier sélectionné */}
    {pill&&<C>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{pill.icon} Modules — {pill.title}</div>
        <Btn sm color={pill.color} onClick={()=>{setShowNewMod(true);setEditMod(null);setMTitle("");setMDur("");setMDesc("");}}>+ Ajouter un module</Btn>
      </div>

      {/* Nouveau module */}
      {showNewMod&&<div style={{marginBottom:14,padding:14,background:pill.color+"08",borderRadius:10,border:`1px solid ${pill.color}35`}}>
        <div style={{fontSize:12,fontWeight:700,color:pill.color,marginBottom:10,fontFamily:"'Outfit',sans-serif"}}>Nouveau module</div>
        <div style={{marginBottom:8}}><div style={{fontSize:11,color:"#71717A",marginBottom:4}}>Titre *</div><input value={mTitle} onChange={e=>setMTitle(e.target.value)} placeholder="Titre du module" style={{width:"100%",fontSize:13,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px 11px",boxSizing:"border-box",fontFamily:"'Inter',sans-serif"}}/></div>

                <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#71717A",marginBottom:4}}>Description</div><textarea value={mDesc} onChange={e=>setMDesc(e.target.value)} rows={2} style={{width:"100%",fontSize:12,border:"1px solid #E4E4E7",borderRadius:8,padding:"8px 11px",fontFamily:"'Inter',sans-serif",resize:"vertical",boxSizing:"border-box"}}/></div>
                <div style={{display:"flex",gap:7}}><Btn sm color={pill.color} onClick={saveMod}>Sauvegarder</Btn><Btn sm outline color="#71717A" onClick={()=>setEditMod(null)}>Annuler</Btn></div>
              </div>
            ):(
              <C style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderLeft:`4px solid ${pill.color}`}}>
                <div style={{width:32,height:32,borderRadius:9,background:pill.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{m.title}</div>
                  <div style={{fontSize:11,color:"#A1A1AA",marginTop:1}}>⏱ {m.duration}{m.description&&` · ${m.description}`}</div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  <button onClick={()=>startEditMod(pilier,i)} style={{padding:"5px 9px",borderRadius:7,border:"1px solid #E4E4E7",background:"#fff",cursor:"pointer",fontSize:12}}>✏️</button>
                  <button onClick={()=>deleteMod(pilier,i)} style={{padding:"5px 9px",borderRadius:7,border:"1px solid #FEE2E2",background:"#FFF1F2",cursor:"pointer",fontSize:12,color:"#E11D48"}}>🗑️</button>
                </div>
              </C>
            )}
          </div>
        ))}
      </div>
    </C>}
  </div>;
}

// ═══════════════════════ MANAGER USERS ═══════════════════════
function ManagerUsers({extraUsers,setExtraUsers}){
  const [showForm,setShowForm]=useState(false);
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [role,setRole]=useState("sales");
  const [done,setDone]=useState(false);
  const AVATAR_COLORS=["#16A34A","#0B68B4","#DA4F00","#7C3AED","#E11D48","#0891B2","#D97706"];
  const allUsers=[...USERS,...(extraUsers||[])];

  function getInitials(n){return n.trim().split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();}
  function randColor(){return AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];}

  function addUser(){
    if(!name.trim()||!email.trim()) return;
    const newUser={
      id:"user_"+Date.now(),
      name:name.trim(),
      prenom:name.trim().split(" ")[0],
      role,
      avatar:getInitials(name),
      color:randColor(),
      email:email.trim(),
      createdAt:today(),
    };
    setExtraUsers(p=>[...(p||[]),newUser]);
    setName("");setEmail("");setRole("sales");setShowForm(false);setDone(true);
    setTimeout(()=>setDone(false),3000);
  }
  function deleteUser(id){
    setExtraUsers(p=>(p||[]).filter(u=>u.id!==id));
  }

  const rc={sales:"#16A34A",manager:"#0B68B4",formateur:"#DA4F00"};
  const rl={sales:"Sales 📞",manager:"Manager 👔",formateur:"Formateur 🎓"};

  return <div>
    <ST emoji="👥" sub="Créez et gérez les comptes de l'équipe. Le mot de passe est commun à tous les comptes.">Gestion des utilisateurs</ST>

    {done&&<div style={{marginBottom:12,padding:"11px 16px",borderRadius:10,background:"#D1FAE5",border:"1px solid #86EFAC",fontSize:13,fontWeight:600,color:"#15803D"}}>✅ Utilisateur créé ! Il peut se connecter dès maintenant avec le mot de passe commun.</div>}

    {/* Mot de passe commun */}
    <C style={{marginBottom:14,background:"#F0FDF4",border:"1px solid #C0EAD3"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>🔒</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"#15803D",fontFamily:"'Outfit',sans-serif"}}>Mot de passe commun : <span style={{fontFamily:"monospace",background:"#D1FAE5",padding:"2px 10px",borderRadius:6,fontSize:14,letterSpacing:".1em"}}>Sherpas2026</span></div>
          <div style={{fontSize:11,color:"#71717A",marginTop:2}}>Tous les comptes utilisent le même mot de passe. Pour le changer, modifie la variable PASSWORD dans le HTML.</div>
        </div>
      </div>
    </C>

    {/* Stats rapides */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
      {[["📞","Sales",allUsers.filter(u=>u.role==="sales").length,"#16A34A"],["👔","Managers",allUsers.filter(u=>u.role==="manager").length,"#0B68B4"],["🎓","Formateurs",allUsers.filter(u=>u.role==="formateur").length,"#DA4F00"]].map(([ic,l,v,c])=>(
        <C key={l} style={{padding:14,textAlign:"center",borderTop:`3px solid ${c}`}}>
          <div style={{fontSize:22,marginBottom:4}}>{ic}</div>
          <div style={{fontSize:22,fontWeight:900,color:c,fontFamily:"'Outfit',sans-serif"}}>{v}</div>
          <div style={{fontSize:11,color:"#71717A"}}>{l}</div>
        </C>
      ))}
    </div>

    {/* Bouton créer */}
    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
      <Btn color="#1E40AF" onClick={()=>setShowForm(!showForm)}>+ Créer un utilisateur</Btn>
    </div>

    {/* Formulaire création */}
    {showForm&&<C style={{marginBottom:14,border:"2px solid #1E40AF",background:"#EFF6FF"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#1E40AF",marginBottom:14,fontFamily:"'Outfit',sans-serif"}}>➕ Nouveau compte</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><div style={{fontSize:11,fontWeight:600,color:"#71717A",marginBottom:5}}>Prénom & Nom *</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="Marie Dupont" style={{width:"100%",fontSize:13,border:"1px solid #E4E4E7",borderRadius:8,padding:"9px 12px",boxSizing:"border-box",fontFamily:"'Inter',sans-serif"}}/></div>
        <div><div style={{fontSize:11,fontWeight:600,color:"#71717A",marginBottom:5}}>Email *</div><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="marie@sherpas.com" type="email" style={{width:"100%",fontSize:13,border:"1px solid #E4E4E7",borderRadius:8,padding:"9px 12px",boxSizing:"border-box",fontFamily:"'Inter',sans-serif"}}/></div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:"#71717A",marginBottom:8}}>Rôle *</div>
        <div style={{display:"flex",gap:9}}>
          {[["sales","Sales 📞","#16A34A"],["manager","Manager 👔","#0B68B4"],["formateur","Formateur 🎓","#DA4F00"]].map(([r,l,c])=>(
            <button key={r} onClick={()=>setRole(r)} style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${role===r?c:"#E4E4E7"}`,background:role===r?c+"10":"#fff",color:role===r?c:"#71717A",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Outfit',sans-serif"}}>{l}</button>
          ))}
        </div>
      </div>
      {!name.trim()||!email.trim()?<div style={{fontSize:11,color:"#E11D48",marginBottom:8}}>* Prénom/Nom et Email requis</div>:null}
      <div style={{display:"flex",gap:8}}>
        <Btn color="#1E40AF" onClick={addUser} disabled={!name.trim()||!email.trim()}>Créer le compte →</Btn>
        <Btn outline color="#71717A" onClick={()=>setShowForm(false)}>Annuler</Btn>
      </div>
    </C>}

    {/* Tableau des utilisateurs */}
    <C style={{padding:0,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#EFF6FF",borderBottom:"2px solid #BFDBFE"}}>{["Compte","Email","Rôle","Statut","Action"].map(h=><th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#71717A",textTransform:"uppercase",fontFamily:"'Outfit',sans-serif"}}>{h}</th>)}</tr></thead>
        <tbody>
          {allUsers.map((u,i)=>{
            const isBuiltIn=USERS.some(x=>x.id===u.id);
            return <tr key={u.id} style={{borderBottom:"1px solid #F4F4F5",background:i%2===0?"#F8FAFF":"#fff"}}>
              <td style={{padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:9}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#fff",fontFamily:"'Outfit',sans-serif",flexShrink:0}}>{u.avatar}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{u.name}</div>
                    {!isBuiltIn&&<div style={{fontSize:10,color:"#A1A1AA"}}>Créé le {u.createdAt||""}</div>}
                  </div>
                </div>
              </td>
              <td style={{padding:"12px 14px",fontSize:12,color:"#71717A"}}>{u.email}</td>
              <td style={{padding:"12px 14px"}}><Pill color={rc[u.role]}>{rl[u.role]}</Pill></td>
              <td style={{padding:"12px 14px"}}>{isBuiltIn?<Pill color="#16A34A">Compte fixe</Pill>:<Pill color="#0B68B4">Actif ✓</Pill>}</td>
              <td style={{padding:"12px 14px"}}>
                {!isBuiltIn
                  ?<button onClick={()=>deleteUser(u.id)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #FEE2E2",background:"#FFF1F2",color:"#E11D48",fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"'Outfit',sans-serif"}}>Supprimer</button>
                  :<span style={{fontSize:11,color:"#A1A1AA"}}>—</span>
                }
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </C>
  </div>;
}

// ═══════════════════════ LOGIN SCREEN ═══════════════════════
function LoginScreen({onLogin}){
  const [selectedUser,setSelectedUser]=useState(null);
  const [pwd,setPwd]=useState("");
  const [error,setError]=useState("");
  const [showPwd,setShowPwd]=useState(false);
  const [loading,setLoading]=useState(false);

  function handleLogin(){
    if(!selectedUser){setError("Sélectionne ton compte.");return;}
    if(pwd!==PASSWORD){setError("Mot de passe incorrect. Réessaie.");setPwd("");return;}
    setError("");setLoading(true);
    setTimeout(()=>onLogin(selectedUser),700);
  }

  return <div style={{minHeight:"100vh",background:"linear-gradient(150deg,#0D1F12 0%,#16A34A 60%,#62E58E 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,position:"relative",overflow:"hidden"}}>
    {/* Déco */}
    <svg style={{position:"absolute",top:0,left:0,opacity:.08,pointerEvents:"none"}} width="400" height="280" viewBox="0 0 400 280"><path d="-20,80 Q80,20 180,100 Q280,180 380,60" stroke="white" strokeWidth="60" fill="none" strokeLinecap="round"/></svg>
    <svg style={{position:"absolute",bottom:0,right:0,opacity:.06,pointerEvents:"none"}} width="360" height="260" viewBox="0 0 360 260"><path d="0,200 Q100,100 220,160 Q320,210 380,100" stroke="white" strokeWidth="70" fill="none" strokeLinecap="round"/></svg>

    {/* Logo */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
      <Logo size={44} white={true}/>
      <span style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"'Outfit',sans-serif",letterSpacing:"-.02em"}}>LES SHERPAS</span>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:32}}>
      <span style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>🏔️ Sales Center V5</span>
      <span style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>Accès sécurisé 🔒</span>
    </div>

    {/* Login box */}
    <div style={{width:"100%",maxWidth:460,background:"rgba(255,255,255,.97)",borderRadius:24,padding:36,boxShadow:"0 24px 80px rgba(0,0,0,.25)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:20,fontWeight:900,color:"#18181B",fontFamily:"'Outfit',sans-serif",marginBottom:4}}>Connexion à ton espace</div>
        <div style={{fontSize:13,color:"#71717A"}}>Sélectionne ton compte puis entre le mot de passe</div>
      </div>

      {/* Sélection utilisateur */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:"#3F3F46",marginBottom:10,fontFamily:"'Outfit',sans-serif"}}>👤 Ton compte</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {USERS.map(u=>{
            const on=selectedUser?.id===u.id;
            const roleLabel={sales:"Sales 📞",manager:"Manager 👔",formateur:"Formateur 🎓"}[u.role];
            return <button key={u.id} onClick={()=>{setSelectedUser(u);setError("");}} style={{
              padding:"14px 16px",borderRadius:14,
              border:`2px solid ${on?u.color:"#E4E4E7"}`,
              background:on?u.color+"10":"#FAFAFA",
              cursor:"pointer",textAlign:"left",
              transition:"all .15s",
            }}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:on?u.color:"#E4E4E7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff",fontFamily:"'Outfit',sans-serif",flexShrink:0}}>{u.avatar}</div>
                <div>
                  <div style={{fontSize:14,fontWeight:800,color:on?u.color:"#18181B",fontFamily:"'Outfit',sans-serif"}}>{u.name}</div>
                  <div style={{fontSize:11,color:"#71717A",marginTop:1}}>{roleLabel}</div>
                </div>
              </div>
              {on&&<div style={{width:8,height:8,borderRadius:"50%",background:u.color,position:"absolute",top:10,right:10}}/>}
            </button>;
          })}
        </div>
      </div>

      {/* Mot de passe */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:"#3F3F46",marginBottom:8,fontFamily:"'Outfit',sans-serif"}}>🔒 Mot de passe</div>
        <div style={{position:"relative"}}>
          <input
            type={showPwd?"text":"password"}
            value={pwd}
            onChange={e=>{setPwd(e.target.value);setError("");}}

            style={{width:"100%",fontSize:15,fontWeight:600,border:`2px solid ${error?"#E11D48":"#E4E4E7"}`,borderRadius:12,padding:"12px 48px 12px 16px",boxSizing:"border-box",fontFamily:"'Outfit',sans-serif",color:"#18181B",outline:"none",letterSpacing:".05em"}}

      </div>

      {/* Bouton */}
      <button onClick={handleLogin} disabled={loading} style={{
        width:"100%",padding:"14px",borderRadius:99,border:"none",
        background:loading?"#A1A1AA":"linear-gradient(135deg,#16A34A,#62E58E)",
        color:"#fff",fontWeight:800,fontSize:15,
        fontFamily:"'Outfit',sans-serif",cursor:loading?"not-allowed":"pointer",
        boxShadow:loading?"none":"0 4px 20px rgba(22,163,74,.4)",
        transition:"all .2s",
      }}>
        {loading?"Connexion en cours…":"Se connecter →"}
      </button>

      <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#A1A1AA"}}>
        Accès réservé à l'équipe Sherpas · Toute tentative est enregistrée
      </div>
    </div>
  </div>;
}

// ═══════════════════════ APP ROOT — SUPABASE ═══════════════════════
function App(){
  const [user,setUser]       = useState(null);
  const [space,setSpace]     = useState(null);
  const [page,setPage]       = useState(null);
  const [loading,setLoading] = useState(false);
  const [dbReady,setDbReady] = useState(false);
  const [dbError,setDbError] = useState(null);

  // ── State data — pré-chargé avec données locales, remplacé par Supabase ──
  const [scripts]              = useState(INIT_SCRIPTS);
  const [objections]           = useState(INIT_OBJECTIONS);
  const [feedbacks,  setFeedbacks]   = useState(INIT_FEEDBACKS);
  const [demandes,   setDemandes]    = useState(INIT_DEMANDES);
  const [rentree,    setRentree]     = useState(INIT_RENTREE);
  const [suggestions,setSuggestions] = useState(INIT_SUGGESTIONS);
  const [stock,      setStock]       = useState(INIT_STOCK);
  const [matchings,  setMatchings]   = useState(INIT_MATCHINGS);
  const [formations, setFormations]  = useState(FORMATION_DEFAULT);
  const [extraUsers, setExtraUsers]  = useState([]);

  // ── Chargement Supabase (en arrière-plan, non-bloquant) ──────────────
  async function loadAll(){
    setLoading(true); setDbError(null);
    try {
      const [fb,ma,dm,rt,sg,sk,cfg] = await Promise.all([
        sb.from("feedbacks").select("*").order("created_at",{ascending:false}),
        sb.from("matchings").select("*").order("created_at",{ascending:false}),
        sb.from("demandes").select("*").order("created_at",{ascending:false}),
        sb.from("rentree").select("*").order("created_at",{ascending:false}),
        sb.from("suggestions").select("*").order("created_at",{ascending:false}),
        sb.from("stock").select("*").order("id"),
        sb.from("config").select("*"),
      ]);
      const anyErr = fb.error||ma.error||dm.error||rt.error||sg.error||sk.error;
      if(anyErr) throw new Error(anyErr.message);
      if(fb.data?.length)  setFeedbacks(fb.data.map(rowToFeedback));
      if(ma.data?.length)  setMatchings(ma.data.map(rowToMatching));
      if(dm.data?.length)  setDemandes(dm.data.map(rowToDemande));
      if(rt.data?.length)  setRentree(rt.data.map(rowToRentree));
      if(sg.data?.length)  setSuggestions(sg.data.map(rowToSuggestion));
      if(sk.data?.length)  setStock(sk.data.map(rowToStock));
      // Config : formations et utilisateurs supplémentaires
      if(cfg.data&&!cfg.error){
        const fRow=cfg.data.find(r=>r.key==="formations");
        const uRow=cfg.data.find(r=>r.key==="extra_users");
        if(fRow?.value) try{setFormations(JSON.parse(fRow.value));}catch(e){}
        if(uRow?.value) try{setExtraUsers(JSON.parse(uRow.value));}catch(e){}
      }
      setDbReady(true);
    } catch(e){
      console.warn("Supabase indisponible — mode local actif:",e.message);
      setDbError(e.message);
      setDbReady(false);
    } finally { setLoading(false); }
  }

  // ── Login SYNCHRONE — affiche l'app immédiatement, charge Supabase après ──
  function handleLogin(u){
    const roleToSpace={sales:"sales",manager:"manager",formateur:"formateur"};
    const roleToPage={sales:"dash",manager:"m-vue",formateur:"f-scripts"};
    // On set tout en une fois pour un seul re-render
    setUser(u);
    setSpace(roleToSpace[u.role]);
    setPage(roleToPage[u.role]);
    // Supabase en arrière-plan — ne bloque pas l'affichage
    setTimeout(()=>loadAll(), 0);
  }

  function logout(){
    setUser(null);setSpace(null);setPage(null);
    setDbReady(false);setDbError(null);
    // Reset avec données locales
    setFeedbacks(INIT_FEEDBACKS);setMatchings(INIT_MATCHINGS);
    setDemandes(INIT_DEMANDES);setRentree(INIT_RENTREE);setSuggestions(INIT_SUGGESTIONS);
  }

  // ── Temps réel Supabase (seulement si connecté) ────────────────────
  useEffect(()=>{
    if(!user||!dbReady) return;
    const handler=()=>loadAll();
    const channels=[
      sb.channel("fb-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"feedbacks"},handler).subscribe(),
      sb.channel("ma-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"matchings"},handler).subscribe(),
      sb.channel("dm-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"demandes"},handler).subscribe(),
      sb.channel("rt-rt").on("postgres_changes",{event:"INSERT",schema:"public",table:"rentree"},handler).subscribe(),
      sb.channel("sg-rt").on("postgres_changes",{event:"*",schema:"public",table:"suggestions"},handler).subscribe(),
      sb.channel("sk-rt").on("postgres_changes",{event:"*",schema:"public",table:"stock"},handler).subscribe(),
    ];
    return ()=>channels.forEach(c=>{ try{sb.removeChannel(c);}catch(e){} });
  },[user,dbReady]);

  // ── Fonctions de sauvegarde — écrivent en local ET dans Supabase ──
  async function addFeedback(f){
    // Mise à jour locale immédiate
    setFeedbacks(p=>[f,...p]);
    // Puis Supabase en arrière-plan
    try{const row={date:f.date,auteur:f.auteur,anonyme:f.anonyme,client_types:f.clientTypes||[],objections:f.objections||[],bien:f.bien||[],bloque:f.bloque||[],confiance:f.confiance,suggestions:f.suggestions||""};await sb.from("feedbacks").insert(row);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function addMatching(m){
    setMatchings(p=>[m,...p]);
    try{const row={date:m.date,auteur:m.auteur,ideal_typ:m.idealTyp,chosen_typ:m.chosenTyp,followed:m.followed,niveau:m.niveau||"",psycho:m.psycho||""};await sb.from("matchings").insert(row);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function addDemande(d){
    setDemandes(p=>[d,...p]);
    try{const row={date:d.date,auteur:d.auteur,cp:d.cp,ville:d.ville,matieres:d.matieres||[],niveau:d.niveau,typo:d.typo||[]};await sb.from("demandes").insert(row);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function addRentree(r){
    setRentree(p=>[r,...p]);
    try{const row={date:r.date,auteur:r.auteur,famille:r.famille,classe:r.classe,matieres:r.matieres||[],rappel:r.rappel,notes:r.notes||""};await sb.from("rentree").insert(row);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function addSuggestion(s){
    setSuggestions(p=>[s,...p]);
    try{const row={date:s.date,auteur:s.auteur,type:s.type,contenu:s.contenu,statut:"pending"};await sb.from("suggestions").insert(row);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function updateSuggestionStatut(id,statut){
    setSuggestions(p=>p.map(s=>s.id===id?{...s,statut}:s));
    try{await sb.from("suggestions").update({statut}).eq("id",id);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function deleteSuggestion(id){
    setSuggestions(p=>p.filter(s=>s.id!==id));
    try{await sb.from("suggestions").delete().eq("id",id);}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function updateStock(newStock){
    setStock(newStock);
    try{for(const s of newStock){await sb.from("stock").update({dispo:s.dispo,nb:s.nb}).eq("typ",s.typ);}}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function saveFormations(next){
    setFormations(next);
    try{await sb.from("config").upsert({key:"formations",value:JSON.stringify(next)},{onConflict:"key"});}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }
  async function saveExtraUsers(fn){
    const next=typeof fn==="function"?fn(extraUsers):fn;
    setExtraUsers(next);
    try{await sb.from("config").upsert({key:"extra_users",value:JSON.stringify(next)},{onConflict:"key"});}
    catch(e){console.warn("Supabase write skipped:",e.message);}
  }

  // ── Guards ────────────────────────────────────────────────────────
  if(!user||!space||!page) return <LoginScreen onLogin={handleLogin}/>;

  // ── Données filtrées par Sales ────────────────────────────────────
  const myFeedbacks = user.role==="sales" ? feedbacks.filter(f=>f.auteur===user.name) : feedbacks;
  const myDemandes  = user.role==="sales" ? demandes.filter(d=>d.auteur===user.name)  : demandes;
  const myRentree   = user.role==="sales" ? rentree.filter(r=>r.auteur===user.name)   : rentree;
  const myMatchings = user.role==="sales" ? matchings.filter(m=>m.auteur===user.name) : matchings;

  // ── Bannière statut DB ────────────────────────────────────────────
  const dbBanner = loading
    ? <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,padding:"9px 16px",marginBottom:12,fontSize:12,color:"#1D4ED8",display:"flex",alignItems:"center",gap:8}}><div style={{width:14,height:14,border:"2px solid #93C5FD",borderTopColor:"#1D4ED8",borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/> Synchronisation avec Supabase…</div>
    : dbError
    ? <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"9px 16px",marginBottom:12,fontSize:12,color:"#991B1B",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>⚠️ Mode local — données non synchronisées ({dbError.slice(0,60)}…)</span><button onClick={loadAll} style={{background:"#EF4444",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Outfit',sans-serif"}}>Réessayer</button></div>
    : null;

  // ── Pages ─────────────────────────────────────────────────────────
  const pages={
    dash:      ()=><SalesDash rentree={myRentree} user={user}/>,
    lanterne:  ()=><SalesLanterne stock={stock} setMatchings={addMatching} user={user}/>,
    scripts:   ()=><SalesScripts scripts={scripts}/>,
    objections:()=><SalesObjections objections={objections} setSuggestions={(s)=>addSuggestion(s)}/>,
    formation: ()=><SalesFormation formations={formations}/>,
    feedback:  ()=><SalesFeedback feedbacks={myFeedbacks} setFeedbacks={addFeedback} setSuggestions={addSuggestion} user={user}/>,
    demandes:  ()=><SalesDemandes demandes={myDemandes} setDemandes={addDemande} user={user}/>,
    rentree:   ()=><SalesRentree rentree={myRentree} setRentree={addRentree} user={user}/>,
    "m-vue":        ()=><ManagerVue feedbacks={feedbacks} rentree={rentree} matchings={matchings}/>,
    "m-matching":   ()=><ManagerMatching matchings={matchings}/>,
    "m-besoins":    ()=><ManagerBesoins feedbacks={feedbacks}/>,
    "m-rentree":    ()=><ManagerRentree rentree={rentree}/>,
    "m-feedback":   ()=><ManagerFeedbacks feedbacks={feedbacks}/>,
    "m-progression":()=><ManagerProgression matchings={matchings}/>,
    "m-users":      ()=><ManagerUsers extraUsers={extraUsers} setExtraUsers={saveExtraUsers}/>,
    "f-scripts":    ()=><FormateurScripts scripts={scripts} setScripts={()=>{}}/>,
    "f-formations": ()=><FormateurFormations formations={formations} setFormations={saveFormations}/>,
    "f-stock":      ()=><FormateurStock stock={stock} setStock={updateStock}/>,
    "f-suggestions":()=><FormateurSuggestions suggestions={suggestions} setSuggestions={setSuggestions} updateStatut={updateSuggestionStatut} deleteSugg={deleteSuggestion}/>,
    "f-users":      ()=><FormateurUsers/>,
  };
  const Page=pages[page]||(()=>null);

  return <div style={{display:"flex",height:"100vh",fontFamily:"'Inter',sans-serif",background:"#F8FFF9"}}>
    <SidebarWithUser role={space} page={page} setPage={setPage} onLogout={logout} user={user} dbReady={dbReady} loading={loading}/>
    <div style={{flex:1,overflow:"auto",padding:26}}>
      {dbBanner}
      <Page/>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if(window.__clearLoading) window.__clearLoading();
</script>

<!-- Lanceur intelligent : cache OU compilation Babel selon disponibilité -->
<script>
(function(){
  function runCompiled(code){
    var s=document.createElement('script');
    s.textContent=code;
    document.body.appendChild(s);
  }

  function compileAndRun(){
    var src=document.getElementById('app-source').textContent;
    var compiled=Babel.transform(src,{presets:['react'],plugins:['transform-class-properties']}).code;
    // Mise en cache pour les prochaines ouvertures
    try{
      localStorage.setItem(window.__CACHE_KEY, compiled);
      localStorage.setItem(window.__CACHE_VER_KEY, window.__CACHE_VER);
    }catch(e){}
    runCompiled(compiled);
  }

  if(window.__compiledJS){
    // ⚡ Cache disponible — Babel inutile, démarrage instantané
    runCompiled(window.__compiledJS);
  } else {
    // Première ouverture — charger Babel et compiler (puis mettre en cache)
    var babelScript=document.createElement('script');
    babelScript.src='https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js';
    babelScript.onload=compileAndRun;
    babelScript.onerror=function(){
      document.getElementById('loading').innerHTML='<div style="color:#fff;font-family:sans-serif;text-align:center;padding:32px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:18px;font-weight:700">Connexion internet requise</div><div style="font-size:13px;margin-top:8px;opacity:.8">Le site doit être chargé une première fois avec internet pour être mis en cache.</div></div>';
    };
    document.body.appendChild(babelScript);
  }
})();
</script>
